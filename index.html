<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirect...</title>
  <style>body{margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:sans-serif;background:#f5f5f5;}p{color:#999;font-size:14px;}</style>
</head>
<body>
  <p>Reindirizzamento in corso...</p>
  <script>
    (function(){
      var ua = navigator.userAgent||navigator.vendor;
      if(/android/i.test(ua)){
        window.location.replace("https://play.google.com/store/apps/details?id=glospen.fbase.futbolbase");
      } else if(/ipad|iphone|ipod/i.test(ua)){
        window.location.replace("https://apps.apple.com/es/app/fbase-tv-f%C3%BAtbol-base/id1533531043");
      } else {
        window.location.replace("https://web.fbase.tv/");
      }
    })();
  </script>
</body>
</html>
